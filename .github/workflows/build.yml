name: SonarQube Scan

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Trigger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Detect Maven project directory
        id: detect
        run: |
          set -euo pipefail
          # Find the first pom.xml outside .github; fallback to repository root
          proj=$(find . -maxdepth 3 -name pom.xml -not -path "./.github/*" | head -n1 || true)
          if [ -z "$proj" ]; then
            echo "No pom.xml found within depth 3, using repository root"
            echo "project_dir=." >> "$GITHUB_OUTPUT"
          else
            proj_dir=$(dirname "$proj")
            # normalize path (remove leading ./)
            proj_dir="${proj_dir#./}"
            [ -z "$proj_dir" ] && proj_dir="."
            echo "Detected Maven project directory: $proj_dir"
            echo "project_dir=$proj_dir" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with Maven
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: mvn -B -DskipTests clean package

      - name: Debug build outputs
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: |
          echo "Working directory: $(pwd)"
          echo "Listing charset of pom.xml (for clarity):"
          test -f pom.xml && head -n 5 pom.xml || echo "no pom.xml here"
          echo "Finding target directories (maxdepth 4):"
          find . -maxdepth 4 -type d -name target -print || true
          echo "Looking for target/classes directories:"
          find . -type d -path "*/target/classes" -print || true
          echo "Listing root target (if present):"
          ls -la target || true

      - name: SonarQube Scan via Maven
        working-directory: ${{ steps.detect.outputs.project_dir }}
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # Optional: set SONAR_PROJECT_KEY in repo secrets; otherwise Maven will try to infer or use project configuration
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY || '' }}
        run: |
          set -euo pipefail
          if [ -z "${SONAR_HOST_URL:-}" ] || [ -z "${SONAR_TOKEN:-}" ]; then
            echo "ERROR: SONAR_HOST_URL and SONAR_TOKEN must be configured in repository secrets."
            exit 1
          fi

          echo "Running Sonar scanner via Maven from $(pwd)"
          if [ -n "${SONAR_PROJECT_KEY:-}" ]; then
            echo "Using SONAR_PROJECT_KEY from secrets"
            mvn -B sonar:sonar -Dsonar.projectKey="$SONAR_PROJECT_KEY" -Dsonar.host.url="$SONAR_HOST_URL" -Dsonar.login="$SONAR_TOKEN"
          else
            echo "No SONAR_PROJECT_KEY provided; invoking sonar:sonar without explicit project key"
            mvn -B sonar:sonar -Dsonar.host.url="$SONAR_HOST_URL" -Dsonar.login="$SONAR_TOKEN"
          fi
